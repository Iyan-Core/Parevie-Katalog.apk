name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache dihapus karena tidak ada lock file

      - name: 📦 Install dependencies
        run: npm install --no-fund --no-audit

      - name: 🏗️ Build React app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          RAJAONGKIR_API_KEY: ${{ secrets.RAJAONGKIR_API_KEY }}

      - name: 📱 Install Capacitor
        run: |
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

      # ─── Buat capacitor.config.json ──────────────────────────────────
      - name: 📝 Create capacitor.config.json
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "com.katalogpro.app",
            "appName": "KatalogPro",
            "webDir": "dist",
            "server": {
              "cleartext": true,
              "androidScheme": "https"
            }
          }
          EOF

      # ─── Tambah Android platform (skip jika sudah ada) ──────────────
      - name: 📂 Add Android platform
        run: |
          npx cap add android || true

      # ─── Sync Capacitor → Android ─────────────────────────────────────
      - name: 📂 Sync Capacitor → Android
        run: |
          npx cap copy android
          npx cap sync android

      # ─── Tambahkan izin lokasi ke AndroidManifest.xml ─────────────────
      - name: 📝 Add location permissions to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
              sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "$MANIFEST"
              echo "✅ Izin lokasi ditambahkan ke AndroidManifest.xml"
            else
              echo "✅ Izin lokasi sudah ada"
            fi
          else
            echo "⚠️ AndroidManifest.xml tidak ditemukan, membuat default..."
            mkdir -p android/app/src/main
            cat > "$MANIFEST" << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.katalogpro.app">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:exported="true"
                      android:label="@string/title_activity_main"
                      android:launchMode="singleTask"
                      android:theme="@style/AppTheme.NoActionBarLaunch">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="\${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF
          fi

      # ─── Pastikan gradlew executable ──────────────────────────────────
      - name: 🔧 Make gradlew executable
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            echo "✅ gradlew siap"
          else
            echo "❌ gradlew tidak ditemukan! Mungkin sync gagal."
            exit 1
          fi

      # ─── Build APK ─────────────────────────────────────────────────────
      - name: 🔨 Build APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      # ─── Upload APK ────────────────────────────────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KatalogPro-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
